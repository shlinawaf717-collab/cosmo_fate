# Gate 1 reference: LCDM on the same data combo (for delta-chi2).
# Combo matches DESI publication: Pantheon+ WITHOUT SH0ES anchor (Mb marginalized).
likelihood:
  bao.desi_dr2.desi_bao_all: null
  sn.pantheonplus: null
  pipeline.cmb_distprior.PlanckDistPrior:
    python_path: .

theory:
  camb:
    extra_args:
      dark_energy_model: ppf
      num_massive_neutrinos: 1
      nnu: 3.044

params:
  ombh2:
    prior: {min: 0.005, max: 0.1}
    ref: {dist: norm, loc: 0.02236, scale: 0.0003}
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  omch2:
    prior: {min: 0.001, max: 0.99}
    ref: {dist: norm, loc: 0.118, scale: 0.002}
    proposal: 0.001
    latex: \Omega_\mathrm{c} h^2
  H0:
    prior: {min: 20, max: 100}
    ref: {dist: norm, loc: 67.5, scale: 1.0}
    proposal: 0.3
    latex: H_0
  w: -1.0
  wa: 0.0
  mnu: 0.06
  omk: 0.0
  tau: 0.054
  ns: 0.9649
  As: 2.1e-9
  omegam:
    latex: \Omega_\mathrm{m}
  rdrag:
    latex: r_\mathrm{drag}

sampler:
  mcmc:
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
    max_tries: 1000

output: runs/gate1/lcdm_d0nsh
