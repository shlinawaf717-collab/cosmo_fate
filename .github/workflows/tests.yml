name: tests

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  unit-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -r requirements.lock
      - name: Unit tests
        run: >-
          python -m pytest -q
          pipeline/test_fate.py
          pipeline/test_append_mocks.py
          pipeline/test_nested_interface.py
          pipeline/test_aggregate_nested_d0.py
          pipeline/test_matched_prior_audit.py
          pipeline/test_fragility_audit.py
          pipeline/test_early_de_gate.py
      - run: python pipeline/constraint_horizon_audit.py
      - run: python pipeline/prior_fate_audit.py --n 2000000
      - run: python pipeline/inwindow_fit_audit.py
      - run: python pipeline/model_average_audit.py
      - run: python pipeline/matched_prior_audit.py --n 20000
      - run: python pipeline/classify_fparam.py ba runs/phase3/fparam/ba runs/phase3/fparam/fate_ba_a005.json
      - run: python pipeline/classify_fparam.py bin4 runs/phase3/fparam/bin4 runs/phase3/fparam/fate_bin4_a005.json
      - run: python pipeline/early_de_audit.py
      - run: python pipeline/full_planck_feasibility_audit.py
      - run: python pipeline/fragility_audit.py
      - run: python pipeline/gen_paper_numbers.py
      - run: python pipeline/audit_nested_archives.py
      - name: Validate audit invariants
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path(".")
          ah = json.loads((root / "runs/phase3/fparam/ah.json").read_text())
          assert ah["a_h"] is None
          assert ah["KL_future_transport"] == ah["KL_per_bin"]["w1"]

          prior = json.loads((root / "runs/phase3/fparam/prior_fate_audit.json").read_text())
          for row in prior["models"].values():
              total = sum(row[name]["P"] for name in ("RIP", "DS", "DECAY"))
              assert abs(total - 1.0) < 1e-12

          fit = json.loads((root / "runs/phase3/fparam/inwindow_fit_audit.json").read_text())
          assert all(row["converged_registered_threshold"] for row in fit["models"].values())

          matched = json.loads((root / "runs/phase3/fparam/matched_prior_audit.json").read_text())
          assert matched["verdict"]["decision"] == "NO-GO"
          assert matched["common_object"]["common_support_intersection_dimension"] == 1
          assert matched["grammars"]["BIN4"]["diagnostics"]["intrinsic_support_dimension"] == 3
          assert all(row["no_go"] for row in matched["grammars"].values())
          assert all(row["matched_fate"] is None for row in matched["grammars"].values())

          ba = json.loads((root / "runs/phase3/fparam/fate_ba_a005.json").read_text())
          bin4 = json.loads((root / "runs/phase3/fparam/fate_bin4_a005.json").read_text())
          assert abs(ba["RIP"]["P"] - 0.013398019610268767) < 1e-12
          assert ba["DS"]["P"] == 0.0
          assert abs(bin4["RIP"]["P"] - 0.4995871180842279) < 1e-12
          assert bin4["DS"]["P"] == 0.0

          early = json.loads((root / "runs/phase3/fparam/early_de_audit.json").read_text())
          assert early["decision"] == "PASS"
          assert early["weighted_failure_fraction"] == 0.0

          full = json.loads((root / "runs/phase3/fparam/full_planck_feasibility.json").read_text())
          assert full["decision"] == "NO-GO" and not full["run_performed"]
          PY
      - name: Generated artifacts are current
        run: >-
          git diff --exit-code --
          paper/numbers.tex
          paper/FRAGILITY_METRICS.md
          runs/phase3/fragility_metrics.json
          runs/phase3/fparam/ah.json
          runs/phase3/fparam/early_de_audit.json
          runs/phase3/fparam/fate_ba_a005.json
          runs/phase3/fparam/fate_bin4_a005.json
          runs/phase3/fparam/full_planck_feasibility.json
          runs/phase3/fparam/inwindow_fit_audit.json
          runs/phase3/fparam/matched_prior_audit.json
          runs/phase3/fparam/model_average.json
          runs/phase3/fparam/prior_fate_audit.json

  manuscript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tectonic 0.16.9
        run: |
          curl --fail --location --retry 3 \
            --output /tmp/tectonic.tar.gz \
            https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.16.9/tectonic-0.16.9-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf /tmp/tectonic.tar.gz -C /usr/local/bin tectonic
          tectonic --version
      - name: Compile manuscript
        working-directory: paper
        run: tectonic --keep-logs --keep-intermediates main.tex
      - name: Reject TeX defects
        run: |
          test -s paper/main.pdf
          ! grep -Eqi "undefined references|undefined citations|overfull .hbox|fatal error" paper/main.log
